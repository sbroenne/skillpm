name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version "$VERSION" --no-git-tag-version
          npm version "$VERSION" --no-git-tag-version -w packages/skillpm-skill

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

      - name: Publish skillpm to npm
        run: npm publish --provenance --access public

      - name: Publish skillpm-skill to npm
        run: npm publish -w packages/skillpm-skill --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release already exists for $GITHUB_REF_NAME"
            exit 0
          fi

          gh release create "$GITHUB_REF_NAME" --generate-notes
